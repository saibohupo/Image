<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Img</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center}
#fullImg{max-width:100vw;max-height:100vh;object-fit:contain}
</style>
</head>
<body>
<img id="fullImg" src="师哥.png" alt="">
<script>
const d=document.documentElement;
function f(){d.requestFullscreen?d.requestFullscreen():d.webkitRequestFullscreen?d.webkitRequestFullscreen():d.mozRequestFullScreen?d.mozRequestFullScreen():d.msRequestFullscreen&&d.msRequestFullscreen()}
document.body.onclick=f
</script>
</body>
</html>
