<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏图片展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #fullImg {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img id="fullImg" src="github.com/saibohupo/Image/blob/main/师哥.png" alt="全屏展示图">

    <script>
        // 获取页面根元素
        const docEl = document.documentElement;
        const img = document.getElementById('fullImg');

        // 进入全屏函数
        function enterFullScreen() {
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.mozRequestFullScreen) { // Firefox
                docEl.mozRequestFullScreen();
            } else if (docEl.webkitRequestFullscreen) { // Chrome/Safari
                docEl.webkitRequestFullscreen();
            } else if (docEl.msRequestFullscreen) { // IE/Edge
                docEl.msRequestFullscreen();
            }
        }

        // 图片加载完成后自动全屏
        img.onload = function() {
            enterFullScreen();
        }

        // 兼容：部分浏览器需用户交互才能全屏，点击页面任意位置触发全屏
        document.body.addEventListener('click', enterFullScreen);
    </script>
</body>
</html>
